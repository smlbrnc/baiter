# Baiter Pro — nginx ön uç (repo ile birlikte gelir; deploy-vps.sh /etc/nginx/sites-available/ altına kopyalar).
# SSL sertifikası `scripts/setup-ssl-hudme.sh` (certbot --nginx) ile bir kez kurulur;
# bu config certbot'un eklediği server bloğunu kalıcı tutar (deploy override'ında SSL kaybolmasın).

# HTTPS — ana servis
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name hudme.com www.hudme.com;

    ssl_certificate     /etc/letsencrypt/live/hudme.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hudme.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20m;

    location /api {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# HTTP → HTTPS yönlendirme (hudme.com için); ayrıca direkt IP istekleri için fallback.
server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name hudme.com www.hudme.com 52.18.245.113;

    # ACME challenge için /.well-known düz HTTP'de kalsın (certbot renew).
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
