# Baiter Pro — nginx ön uç (repo ile birlikte gelir; deploy-vps.sh /etc/nginx/sites-available/ altına kopyalar)
# Sunucu IP’si ile doğrudan test için server_name içinde IP de tanımlıdır (kaldırılabilir).

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name hudme.com www.hudme.com 52.18.245.113;

    client_max_body_size 20m;

    location /api {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
